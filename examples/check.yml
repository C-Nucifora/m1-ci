# Example: drop this in your M1 project as `.github/workflows/m1.yml`.
# It calls the reusable workflow in m1-ci to format-check, lint, and type-check
# every `.m1scr` in the project on each push and pull request.

name: M1

on:
  push:
  pull_request:

jobs:
  check:
    # Pin m1-ci to a release tag, not @main — the tag freezes the M1 toolchain
    # versions this workflow installs, so a new (stricter) tool release can't
    # break your CI without you bumping this tag deliberately. Keep this in step
    # with the latest m1-ci release: https://github.com/C-Nucifora/m1-ci/releases
    uses: C-Nucifora/m1-ci/.github/workflows/check.yml@v0.22.0
    with:
      # Directory holding your scripts (searched recursively).
      scripts-path: UQR-EV/01.00/Scripts
      # Project file — enables symbol-aware type checking. Omit to let
      # m1-typecheck discover the nearest Project.m1prj upward from each script.
      project-file: UQR-EV/01.00/Project.m1prj
      # Optional knobs (defaults shown):
      # The toolchain is pinned by THIS m1-ci tag. Override a single tool only
      # if you need to (a tag like "v0.13.0", or "latest"). The values below are
      # the tools this m1-ci tag pins (kept in step with tools.env by the
      # ci-ref-pin CI job); uncomment one only to deviate from that pin:
      # fmt-version: v0.13.0
      # lint-version: v0.20.0
      # typecheck-version: v0.37.0
      # project-version: v0.7.0
      # tools-version: latest   # master override: track newest of every tool
      # m1-ci-ref / m1-ci-repo: only needed if you fork m1-ci or pin the
      #   workflow at a different tag than its composite-action default.
      # fail-on-warning: false  # true = warnings fail the build too
      # run-fmt: true
      # run-lint: true
      # run-typecheck: true
      # run-project-validate: true  # validate Project.m1prj structure (m1-project)
      # sarif-upload: true   # lint findings -> GitHub code scanning; the calling
      #   job must grant `permissions: security-events: write`
