name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least-privilege default: every job only reads the repo (and downloads public
# release assets). Jobs opt into more only if they need it.
permissions:
  contents: read

jobs:
  actionlint:
    name: Lint workflows
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Run actionlint
        run: |
          set -euo pipefail
          # Pin actionlint to a fixed version and verify its SHA256, rather than
          # piping a script fetched from the repo's mutable `main` HEAD into bash
          # — a supply-chain risk if that script (or `main`) were ever tampered
          # with (#8).
          # To bump: pick a release from
          # https://github.com/rhysd/actionlint/releases, set VER, then
          # regenerate SHA from that release's linux_amd64 tarball, e.g.:
          #   curl -fsSL "https://github.com/rhysd/actionlint/releases/download/v${VER}/actionlint_${VER}_linux_amd64.tar.gz" | sha256sum
          # (the official checksums are also in that release's checksums.txt).
          VER=1.7.7
          SHA=023070a287cd8cccd71515fedc843f1985bf96c436b7effaecce67290e7e0757
          curl -fsSL -o actionlint.tgz \
            "https://github.com/rhysd/actionlint/releases/download/v${VER}/actionlint_${VER}_linux_amd64.tar.gz"
          echo "${SHA}  actionlint.tgz" | sha256sum -c -
          tar -xzf actionlint.tgz actionlint
          ./actionlint -color

  # The local pre-commit hooks and the CI workflow must install the SAME tool
  # versions. tools.env is the single source of truth; assert check.yml's input
  # defaults match it so the two halves can never silently drift.
  tools-pins:
    name: tools.env matches check.yml
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Assert pinned versions agree
        run: |
          set -euo pipefail
          # shellcheck disable=SC1091
          . ./tools.env
          default_for() {
            awk -v key="$1-version:" '
              $1 == key { found = 1 }
              found && $1 == "default:" { gsub(/"/, "", $2); print $2; exit }
            ' .github/workflows/check.yml
          }
          fail=0
          check() {
            local tool="$1" envv="$2" wf
            wf="$(default_for "$tool")"
            if [ "$wf" != "$envv" ]; then
              echo "::error::$tool: check.yml default '$wf' != tools.env '$envv'"
              fail=1
            else
              echo "$tool: $wf (agrees)"
            fi
          }
          check fmt "$M1_FMT_VERSION"
          check lint "$M1_LINT_VERSION"
          check typecheck "$M1_TYPECHECK_VERSION"
          exit "$fail"

  # The local hooks must actually run the pinned binaries against the clean
  # fixture and pass — proving the download+exec path works end to end.
  self-test-hooks:
    name: Self-test (local hooks pass)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Run the m1-fmt / m1-lint / m1-typecheck hooks on the fixture
        run: |
          set -euo pipefail
          find tests/fixture -name '*.m1scr' -print0 | xargs -0 ./hooks/m1-fmt
          find tests/fixture -name '*.m1scr' -print0 | xargs -0 ./hooks/m1-lint
          find tests/fixture -name '*.m1scr' -print0 | xargs -0 ./hooks/m1-typecheck

  # Dogfood: run the reusable workflow against the clean fixture project. It must
  # pass — proving the end-to-end install + fmt/lint/typecheck pipeline is green.
  self-test-pass:
    name: Self-test (clean fixture passes)
    uses: ./.github/workflows/check.yml
    with:
      scripts-path: tests/fixture
      project-file: tests/fixture/Project.m1prj
      fail-on-warning: true
      # Dogfood THIS commit's composite actions, not the released default tag —
      # otherwise the self-test would validate the last release, not the PR.
      m1-ci-repo: ${{ github.repository }}
      m1-ci-ref: ${{ github.sha }}

  # The complement: a deliberately broken fixture must make the gate fail. We run
  # the linter directly and assert a non-zero exit, so a regression that silently
  # stops failing is caught.
  self-test-fail:
    name: Self-test (broken fixture fails)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Read pinned versions from tools.env
        id: pins
        run: |
          set -euo pipefail
          # shellcheck disable=SC1091
          . ./tools.env
          echo "lint-version=$M1_LINT_VERSION" >> "$GITHUB_OUTPUT"
      # Install the SAME pinned m1-lint as check.yml / the hooks (from tools.env),
      # with the same attestation check — not "latest" unpinned-and-untrusted —
      # so this negative self-test exercises the real release we ship.
      - name: Install m1-lint
        uses: ./.github/actions/install-m1-tool
        with:
          tool: m1-lint
          version: ${{ steps.pins.outputs.lint-version }}
          github-token: ${{ github.token }}
      - name: Assert the broken fixture is rejected
        run: |
          set -uo pipefail
          if find tests/fixture-bad -name '*.m1scr' -print0 | xargs -0 m1-lint; then
            echo "::error::m1-lint accepted the broken fixture — the gate is not failing as it should"
            exit 1
          fi
          echo "Broken fixture correctly rejected by m1-lint."
