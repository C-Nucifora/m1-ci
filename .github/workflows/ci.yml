name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least-privilege default: every job only reads the repo (and downloads public
# release assets). Jobs opt into more only if they need it.
permissions:
  contents: read

# Cancel superseded runs of the same branch/PR: every push otherwise queues
# a full duplicate job matrix (m1-tools#27).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  actionlint:
    name: Lint workflows
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Run actionlint
        run: |
          set -euo pipefail
          # Pin actionlint to a fixed version and verify its SHA256, rather than
          # piping a script fetched from the repo's mutable `main` HEAD into bash
          # — a supply-chain risk if that script (or `main`) were ever tampered
          # with (#8).
          # To bump: pick a release from
          # https://github.com/rhysd/actionlint/releases, set VER, then
          # regenerate SHA from that release's linux_amd64 tarball, e.g.:
          #   curl -fsSL "https://github.com/rhysd/actionlint/releases/download/v${VER}/actionlint_${VER}_linux_amd64.tar.gz" | sha256sum
          # (the official checksums are also in that release's checksums.txt).
          VER=1.7.12
          SHA=8aca8db96f1b94770f1b0d72b6dddcb1ebb8123cb3712530b08cc387b349a3d8
          curl -fsSL -o actionlint.tgz \
            "https://github.com/rhysd/actionlint/releases/download/v${VER}/actionlint_${VER}_linux_amd64.tar.gz"
          echo "${SHA}  actionlint.tgz" | sha256sum -c -
          tar -xzf actionlint.tgz actionlint
          ./actionlint -color

  # The local pre-commit hooks and the CI workflow must install the SAME tool
  # versions. tools.env is the single source of truth; assert check.yml's input
  # defaults match it so the two halves can never silently drift.
  tools-pins:
    name: tools.env matches check.yml
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Assert pinned versions agree
        run: |
          set -euo pipefail
          # shellcheck disable=SC1091
          . ./tools.env
          default_for() {
            awk -v key="$1-version:" '
              $1 == key { found = 1 }
              found && $1 == "default:" { gsub(/"/, "", $2); print $2; exit }
            ' .github/workflows/check.yml
          }
          fail=0
          check() {
            local tool="$1" envv="$2" wf
            wf="$(default_for "$tool")"
            if [ "$wf" != "$envv" ]; then
              echo "::error::$tool: check.yml default '$wf' != tools.env '$envv'"
              fail=1
            else
              echo "$tool: $wf (agrees)"
            fi
          }
          check fmt "$M1_FMT_VERSION"
          check lint "$M1_LINT_VERSION"
          check typecheck "$M1_TYPECHECK_VERSION"
          check project "$M1_PROJECT_VERSION"
          exit "$fail"

  # The `m1-ci-ref` input default in check.yml is the tag at which a consuming
  # reusable-workflow run checks m1-ci out to resolve its composite actions. It
  # is a manual touchpoint that must be bumped to the new tag on every release
  # (alongside VERSION). VERSION is the single source of truth for the release
  # tag (release.yml cuts `v$VERSION`); assert the m1-ci-ref default — and the
  # example pin in examples/check.yml — agree with it, so the self-resolving ref
  # can never silently drift from the version we actually ship.
  ci-ref-pin:
    name: m1-ci-ref default matches VERSION
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Assert m1-ci-ref default == v$(cat VERSION)
        run: |
          set -euo pipefail
          want="v$(tr -d ' \t\n\r' < VERSION)"
          fail=0
          assert() {
            local what="$1" got="$2"
            if [ "$got" != "$want" ]; then
              echo "::error::$what is '$got' but VERSION implies '$want' — bump it on release"
              fail=1
            else
              echo "$what: $got (matches VERSION)"
            fi
          }

          # check.yml: the m1-ci-ref input default. Read the `default:` line that
          # follows the `m1-ci-ref:` input key (same awk shape as tools-pins).
          ref_default="$(awk '
            $1 == "m1-ci-ref:" { found = 1 }
            found && $1 == "default:" { gsub(/"/, "", $2); print $2; exit }
          ' .github/workflows/check.yml)"
          if [ -z "$ref_default" ]; then
            echo "::error::could not find the m1-ci-ref default in check.yml"
            exit 1
          fi
          assert "check.yml m1-ci-ref default" "$ref_default"

          # examples/check.yml: the documented pin (`...@vX.Y.Z`) consumers copy.
          # Extract the tag the example pins the reusable workflow at.
          example_pin="$(grep -oE 'm1-ci/\.github/workflows/check\.yml@v[0-9]+\.[0-9]+\.[0-9]+' \
            examples/check.yml | sed 's/.*@//' | head -n1)"
          if [ -z "$example_pin" ]; then
            echo "::error::could not find the pinned check.yml tag in examples/check.yml"
            exit 1
          fi
          assert "examples/check.yml pin" "$example_pin"

          exit "$fail"

      # The commented per-tool override examples in examples/check.yml
      # (`# fmt-version: vX.Y.Z`, etc.) double as documentation of the tools
      # THIS m1-ci tag pins. If they drift behind tools.env a developer who
      # copies and uncomments one silently pins a stale tool (#54). Assert each
      # commented version equals the matching tools.env pin.
      - name: Assert examples/check.yml override comments match tools.env
        run: |
          set -euo pipefail
          # shellcheck disable=SC1091
          . ./tools.env
          fail=0
          # Read the version off a `# <tool>-version: vX.Y.Z` comment line.
          comment_for() {
            awk -v key="$1-version:" '
              $1 == "#" && $2 == key { print $3; exit }
            ' examples/check.yml
          }
          check() {
            local tool="$1" envv="$2" ex
            ex="$(comment_for "$tool")"
            if [ -z "$ex" ]; then
              echo "::error::examples/check.yml: no '# $tool-version:' comment found"
              fail=1
            elif [ "$ex" != "$envv" ]; then
              echo "::error::examples/check.yml $tool-version comment '$ex' != tools.env '$envv' — refresh it"
              fail=1
            else
              echo "examples $tool-version: $ex (matches tools.env)"
            fi
          }
          check fmt "$M1_FMT_VERSION"
          check lint "$M1_LINT_VERSION"
          check typecheck "$M1_TYPECHECK_VERSION"
          check project "$M1_PROJECT_VERSION"
          exit "$fail"

  # The local hooks must actually run the pinned binaries against the clean
  # fixture and pass — proving the download+exec path works end to end.
  self-test-hooks:
    name: Self-test (local hooks pass)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Run the m1-fmt / m1-lint / m1-typecheck / m1-project hooks on the fixture
        run: |
          set -euo pipefail
          find tests/fixture -name '*.m1scr' -print0 | xargs -0 ./hooks/m1-fmt
          find tests/fixture -name '*.m1scr' -print0 | xargs -0 ./hooks/m1-lint
          find tests/fixture -name '*.m1scr' -print0 | xargs -0 ./hooks/m1-typecheck
          ./hooks/m1-project-validate tests/fixture/Project.m1prj

  # Dogfood: run the reusable workflow against the clean fixture project. It must
  # pass — proving the end-to-end install + fmt/lint/typecheck/project-validate
  # (+ SARIF render/upload, #26) pipeline is green.
  self-test-pass:
    name: Self-test (clean fixture passes)
    permissions:
      contents: read
      security-events: write # exercised by sarif-upload below
    uses: ./.github/workflows/check.yml
    with:
      scripts-path: tests/fixture
      project-file: tests/fixture/Project.m1prj
      fail-on-warning: true
      sarif-upload: true
      # Dogfood THIS commit's composite actions, not the released default tag —
      # otherwise the self-test would validate the last release, not the PR.
      m1-ci-repo: ${{ github.repository }}
      m1-ci-ref: ${{ github.sha }}

  # The complement: a deliberately broken fixture must make the gate fail. We run
  # the linter directly and assert a non-zero exit, so a regression that silently
  # stops failing is caught.
  self-test-fail:
    name: Self-test (broken fixture fails)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Read pinned versions from tools.env
        id: pins
        run: |
          set -euo pipefail
          # shellcheck disable=SC1091
          . ./tools.env
          echo "lint-version=$M1_LINT_VERSION" >> "$GITHUB_OUTPUT"
      # Install the SAME pinned m1-lint as check.yml / the hooks (from tools.env),
      # with the same attestation check — not "latest" unpinned-and-untrusted —
      # so this negative self-test exercises the real release we ship.
      - name: Install m1-lint
        uses: ./.github/actions/install-m1-tool
        with:
          tool: m1-lint
          version: ${{ steps.pins.outputs.lint-version }}
          github-token: ${{ github.token }}
      - name: Assert the broken fixture is rejected
        run: |
          set -uo pipefail
          if find tests/fixture-bad -name '*.m1scr' -print0 | xargs -0 m1-lint; then
            echo "::error::m1-lint accepted the broken fixture — the gate is not failing as it should"
            exit 1
          fi
          echo "Broken fixture correctly rejected by m1-lint."

  # The typecheck SARIF path (#37): the pinned m1-typecheck, run over a fixture
  # with a known T-code finding (T002 float-equality, project-independent),
  # must emit a SARIF document containing that finding — proving what the
  # check.yml render step uploads is real, not an empty shell.
  self-test-typecheck-sarif:
    name: Self-test (typecheck SARIF carries a T-code)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Read pinned versions from tools.env
        id: pins
        run: |
          set -euo pipefail
          # shellcheck disable=SC1091
          . ./tools.env
          echo "typecheck-version=$M1_TYPECHECK_VERSION" >> "$GITHUB_OUTPUT"
      - name: Install m1-typecheck
        uses: ./.github/actions/install-m1-tool
        with:
          tool: m1-typecheck
          version: ${{ steps.pins.outputs.typecheck-version }}
          github-token: ${{ github.token }}
      - name: Assert the T002 fixture reaches the SARIF document
        run: |
          set -uo pipefail
          # Exit-code semantics are unchanged by --format sarif: findings still
          # exit non-zero, and the document on stdout is still complete.
          if m1-typecheck --format sarif tests/fixture-typecheck-bad/T002.m1scr \
              > "$RUNNER_TEMP/m1-typecheck.sarif"; then
            echo "::error::m1-typecheck exited 0 on the T002 fixture — the gate is not failing as it should"
            exit 1
          fi
          if ! grep -q '"ruleId":"T002"' "$RUNNER_TEMP/m1-typecheck.sarif"; then
            echo "::error::typecheck SARIF does not contain the expected T002 finding"
            cat "$RUNNER_TEMP/m1-typecheck.sarif"
            exit 1
          fi
          echo "T002 finding present in the SARIF document."

  # The SARIF render must survive xargs batching. xargs runs the tool once per
  # ~128 KB batch (xargs --show-limits), so a large project's script list makes
  # it emit several SARIF documents; the render step must aggregate them into one
  # valid document, not concatenate root JSON objects. This test reproduces the
  # multi-batch case with a fake tool and also asserts check.yml uses the
  # aggregating form and structural guard, so a regression is caught.
  self-test-sarif-batching:
    name: Self-test (SARIF render survives xargs batching)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: SARIF render aggregates xargs batches
        run: ./tests/sarif-render-batching.sh

  # The fmt job fails (exit 1) on syntax errors and emits parse warnings, not
  # only on "would reformat". The fmt problem matcher must annotate the file in
  # all three cases, so a red fmt job points the consumer at the offending
  # script (matching lint/typecheck, which annotate every diagnostic).
  self-test-fmt-matcher:
    name: Self-test (fmt matcher annotates syntax errors)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: fmt matcher covers would-reformat, syntax-error and parse-warning
        run: ./tests/fmt-matcher-syntax-error.sh

  # A red Format-check job emits only `<file>: would reformat` — never the diff
  # of what is actually wrong. On failure, the fmt job must land the unified
  # diff (m1-fmt --diff) of every misformatted file in the log, so the fix is
  # self-evident from the run. This test asserts check.yml's fmt job carries
  # that guarded diff step (after the --check step, gated on failure() + a
  # non-zero collected count, over the same script list via xargs, with
  # `|| true` so the diff step itself stays green) so the feedback can't
  # silently regress.
  self-test-fmt-diff:
    name: Self-test (fmt job surfaces a diff on failure)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: fmt job shows a reformat diff when --check fails
        run: ./tests/fmt-check-diff.sh

  # The matcher JSON is shared via the register-matchers composite action so the
  # fmt / lint / typecheck jobs don't inline three near-identical heredocs. This
  # test drives the action's matcher-writing shell for both kinds, asserts each
  # matches the real tool output, and asserts check.yml delegates to the action
  # (no inline matcher heredoc) so the diagnostic regex can't drift between jobs.
  self-test-register-matchers:
    name: Self-test (register-matchers action; no inline matcher drift)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: register-matchers emits correct fmt + diagnostic matchers
        run: ./tests/register-matchers-action.sh

  # The lint-baseline input exposes m1-lint's incremental-adoption path: a
  # project with pre-existing findings can turn the gate on and have it report
  # only new findings. This test asserts check.yml declares the input, plumbs it
  # to BOTH the lint gate and the SARIF render (so suppressed findings don't
  # resurface as code-scanning alerts), documents it, and appends --baseline
  # only when the value is non-empty.
  self-test-lint-baseline:
    name: Self-test (lint-baseline input plumbed and append-only)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: lint-baseline input declared, plumbed to both m1-lint runs
        run: ./tests/lint-baseline-input.sh

  # The SARIF render is shared via the render-sarif composite action so the lint
  # and typecheck render steps don't inline two structurally-identical
  # aggregate-and-validate heredocs. This test drives the action's render shell
  # against a fake tool that splits across xargs batches, asserts it produces one
  # valid aggregated SARIF document (forwarding the extra flag+value, a spaced
  # value intact) and fails on empty/crash output, and asserts check.yml
  # delegates to the action (no inline jq -s render) so the aggregation contract
  # can't drift between the two jobs.
  self-test-render-sarif:
    name: Self-test (render-sarif action; no inline render drift)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: render-sarif aggregates batches into one valid document
        run: ./tests/render-sarif-action.sh

  # The fail-on-warning gate must capture m1-lint's diagnostics — which go to
  # STDERR — or it silently never fires on a warnings-only project. The
  # clean-fixture self-test (fail-on-warning: true) can't catch this: with no
  # warnings, grep-on-empty correctly finds nothing. This test reproduces the
  # gate shell against a fake m1-lint that warns on stderr and exits 0, and
  # asserts the gate fails — and that check.yml's capture folds stderr in (2>&1).
  self-test-lint-fail-on-warning:
    name: Self-test (fail-on-warning captures m1-lint stderr diagnostics)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: fail-on-warning gate fires on a warnings-only project
        run: ./tests/lint-fail-on-warning.sh
