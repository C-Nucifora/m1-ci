name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least-privilege default: every job only reads the repo (and downloads public
# release assets). Jobs opt into more only if they need it.
permissions:
  contents: read

jobs:
  actionlint:
    name: Lint workflows
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Run actionlint
        run: |
          set -euo pipefail
          bash <(curl -fsSL https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash)
          ./actionlint -color

  # Dogfood: run the reusable workflow against the clean fixture project. It must
  # pass — proving the end-to-end install + fmt/lint/typecheck pipeline is green.
  self-test-pass:
    name: Self-test (clean fixture passes)
    uses: ./.github/workflows/check.yml
    with:
      scripts-path: tests/fixture
      project-file: tests/fixture/Project.m1prj
      fail-on-warning: true

  # The complement: a deliberately broken fixture must make the gate fail. We run
  # the linter directly and assert a non-zero exit, so a regression that silently
  # stops failing is caught.
  self-test-fail:
    name: Self-test (broken fixture fails)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install m1-lint
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.local/bin"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          asset="m1-lint-x86_64-unknown-linux-gnu"
          gh release download --repo C-Nucifora/m1-lint --pattern "$asset" \
            --dir "$RUNNER_TEMP" --clobber 2>/dev/null || true
          if [ -f "$RUNNER_TEMP/$asset" ]; then
            mv "$RUNNER_TEMP/$asset" "$HOME/.local/bin/m1-lint"
            chmod +x "$HOME/.local/bin/m1-lint"
          else
            cargo install --git https://github.com/C-Nucifora/m1-lint.git --root "$HOME/.local" m1-lint
          fi
      - name: Assert the broken fixture is rejected
        run: |
          set -uo pipefail
          if find tests/fixture-bad -name '*.m1scr' -print0 | xargs -0 m1-lint; then
            echo "::error::m1-lint accepted the broken fixture — the gate is not failing as it should"
            exit 1
          fi
          echo "Broken fixture correctly rejected by m1-lint."
