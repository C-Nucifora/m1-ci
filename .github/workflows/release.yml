name: Release

# Cuts a GitHub Release (and tag) whenever the VERSION file names a version that
# has no release yet — so bumping VERSION in a merged PR is all it takes to ship
# a new m1-ci tag. Consumers then pin the reusable workflow,
# `uses: C-Nucifora/m1-ci/.github/workflows/check.yml@v0.9.3`. Can also be run
# manually via the Actions tab.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

# Serialize release runs — never cancel one mid-publish; a queued run is
# idempotent for an already-released version (m1-tools#27).
concurrency:
  group: ${{ github.workflow }}-release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - id: v
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(tr -d ' \t\n\r' < VERSION)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if gh release view "v$VERSION" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            echo "Release v$VERSION already exists — nothing to do."
          else
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            echo "Will release v$VERSION."
          fi
      - name: Publish release
        if: steps.v.outputs.should_release == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: v${{ steps.v.outputs.version }}
        run: |
          # Body: auto-generated "What's Changed" (PR list + full changelog
          # link) followed by a consume/install snippet. PR titles may contain
          # backticks, so the generated half never passes through an unquoted
          # heredoc; the static half is a quoted heredoc with placeholders
          # substituted afterwards.
          gh api "repos/$GITHUB_REPOSITORY/releases/generate-notes" \
            -f tag_name="$TAG" -f target_commitish="$GITHUB_SHA" \
            -q .body > body.md || echo "_Generated notes unavailable._" > body.md
          cat >> body.md <<'NOTES'

          ## Pin

          Consume the reusable workflow and the pre-commit hooks at this exact tag:

          ```yaml
          # .github/workflows/check.yml
          jobs:
            m1:
              uses: {{REPO}}/.github/workflows/check.yml@{{TAG}}
          ```

          ```yaml
          # .pre-commit-config.yaml
          - repo: https://github.com/{{REPO}}
            rev: {{TAG}}
          ```
          NOTES
          sed -i "s|{{REPO}}|$GITHUB_REPOSITORY|g; s|{{TAG}}|$TAG|g" body.md
          # The toolchain this tag installs, straight from tools.env.
          {
            echo ""
            echo "## Pinned M1 toolchain"
            echo ""
            echo "| Tool | Version |"
            echo "| --- | --- |"
            sed -n 's/^M1_\(.*\)_VERSION=\(.*\)$/| m1-\L\1\E | \2 |/p' tools.env
          } >> body.md
          gh release create "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --target "$GITHUB_SHA" \
            --title "m1-ci $TAG" \
            --notes-file body.md
