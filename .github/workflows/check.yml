name: M1 Check

# Reusable workflow: format-check, lint, and type-check the M1 scripts in the
# caller's repository with the C-Nucifora M1 toolchain. Diagnostics surface as
# inline annotations on the pull request.
#
# Each check runs as its OWN job (in parallel), so they are independent: a
# failing format check no longer skips the lint and type check — every check
# always runs and reports its own pass/fail as a separate status on the PR.
#
# Use it from an M1 project:
#
#   jobs:
#     check:
#       uses: C-Nucifora/m1-ci/.github/workflows/check.yml@main
#       with:
#         scripts-path: UQR-EV/01.00/Scripts
#         project-file: UQR-EV/01.00/Project.m1prj
#
# Tools are installed from the prebuilt release binaries published by each tool
# repo (m1-fmt / m1-lint / m1-typecheck); if a release is unavailable they are
# built from source as a fallback, so this works even before binaries exist.

on:
  workflow_call:
    inputs:
      scripts-path:
        description: "Directory searched recursively for .m1scr scripts."
        type: string
        default: "."
      project-file:
        description: "Path to Project.m1prj for symbol-aware type checking. Empty = auto-discover upward from each script."
        type: string
        default: ""
      changed-files-only:
        description: >
          On pull_request events, run m1-fmt and m1-lint only on the .m1scr
          files changed vs the PR base (faster, tighter feedback). The type
          check always sees the full tree — its cross-script analysis needs
          the whole project. Falls back to the full tree when the base can't
          be diffed.
        type: boolean
        default: false
      # Per-tool version pins. These default to specific release tags so that a
      # given m1-ci tag installs a frozen, reproducible toolchain — pinning
      # `m1-ci@vX.Y.Z` means your CI keeps working even as the tools release new
      # (possibly stricter) versions. Each accepts a tag (e.g. "v0.4.1") or
      # "latest". When the tools release, bump these defaults and cut a new m1-ci
      # release; callers pinned to an older m1-ci tag are unaffected.
      #
      # These defaults MUST match tools.env — ci.yml's tools-pins job enforces it.
      fmt-version:
        description: "m1-fmt release to install: a tag like 'vX.Y.Z', or 'latest'."
        type: string
        default: "v0.13.0"
      lint-version:
        description: "m1-lint release to install: a tag like 'vX.Y.Z', or 'latest'."
        type: string
        default: "v0.19.0"
      typecheck-version:
        description: "m1-typecheck release to install: a tag like 'vX.Y.Z', or 'latest'."
        type: string
        default: "v0.36.0"
      project-version:
        description: "m1-project release to install: a tag like 'vX.Y.Z', or 'latest'."
        type: string
        default: "v0.7.0"
      tools-version:
        description: "Master override (advanced). Empty (default) uses the pinned per-tool versions above. Set to 'latest' to track the newest release of every tool; a single tag forces all three (the tools are independently versioned, so a shared tag may not exist for all)."
        type: string
        default: ""
      m1-ci-ref:
        description: >
          Ref of C-Nucifora/m1-ci to load this workflow's composite actions
          (install-m1-tool, collect-scripts) from. A reusable workflow's
          local `uses: ./…` paths resolve against the CALLER's checkout, not
          m1-ci's, so each job checks m1-ci out at this ref first. Defaults to
          the tag matching this m1-ci release; pin it to the same tag you pin
          the workflow at (e.g. checkout@v0.9.0 → m1-ci-ref: v0.9.0). Forks can
          point this at their own fork via m1-ci-repo.

          This default MUST equal `v$(cat VERSION)` — ci.yml's ci-ref-pin job
          enforces it, so the self-resolving ref cannot drift from the release.
        type: string
        default: "v0.20.0"
      m1-ci-repo:
        description: "Repo to load the composite actions from. Override for forks."
        type: string
        default: "C-Nucifora/m1-ci"
      run-fmt:
        description: "Run m1-fmt --check."
        type: boolean
        default: true
      run-lint:
        description: "Run m1-lint."
        type: boolean
        default: true
      run-typecheck:
        description: "Run m1-typecheck."
        type: boolean
        default: true
      run-project-validate:
        description: >
          Validate the Project.m1prj with `m1-project validate` (structural
          invariants: well-formed XML, no duplicate sibling names, resolvable
          SelectedTrigger references). Uses `project-file` when set, otherwise
          auto-discovers a Project.m1prj under scripts-path's project root.
          Skips silently when no project file exists (script-only repos).
        type: boolean
        default: true
      sarif-upload:
        description: >
          Additionally emit m1-lint and m1-typecheck findings as SARIF (one
          category each) and upload them to GitHub
          code scanning (github/codeql-action/upload-sarif). The CALLING job
          must grant `security-events: write` (reusable workflows inherit the
          caller's permissions) and the repository must have code scanning
          available (public, or private with Advanced Security) — hence
          opt-in, default false.
        type: boolean
        default: false
      fail-on-warning:
        description: "Fail the build on warning-severity diagnostics, not just errors. m1-lint/m1-typecheck exit 0 on warnings by default."
        type: boolean
        default: false

env:
  CARGO_TERM_COLOR: always

# This reusable workflow only reads the caller's checkout and downloads public
# tool release binaries — no write scopes required.
permissions:
  contents: read

jobs:
  fmt:
    name: Format check (m1-fmt)
    # Skip the whole job (neutral, not failed) when the caller disables it.
    if: inputs.run-fmt
    runs-on: ubuntu-latest
    steps:
      - name: Check out the project
        uses: actions/checkout@v6

      # A reusable workflow's local `uses: ./…` paths resolve against the
      # caller's checkout, not m1-ci's, so we check m1-ci out into a sibling
      # path to load its composite actions (install-m1-tool, collect-scripts).
      - name: Check out m1-ci (for composite actions)
        uses: actions/checkout@v6
        with:
          repository: ${{ inputs.m1-ci-repo }}
          ref: ${{ inputs.m1-ci-ref }}
          path: .m1-ci

      - name: Install m1-fmt
        uses: ./.m1-ci/.github/actions/install-m1-tool
        with:
          tool: m1-fmt
          version: ${{ inputs.fmt-version }}
          tools-version: ${{ inputs.tools-version }}
          github-token: ${{ github.token }}

      - name: Register problem matchers
        run: |
          set -euo pipefail
          # Inlined (not committed-and-referenced) because a reusable workflow runs
          # in the *caller's* checkout — m1-ci's own files are not present here.
          cat > "$RUNNER_TEMP/m1-matchers.json" <<'JSON'
          {
            "problemMatcher": [
              {
                "owner": "m1-fmt-check",
                "severity": "error",
                "pattern": [
                  {
                    "regexp": "^(.+):\\s+would reformat$",
                    "file": 1,
                    "message": 0
                  }
                ]
              }
            ]
          }
          JSON
          echo "::add-matcher::$RUNNER_TEMP/m1-matchers.json"

      - name: Collect scripts
        id: collect
        uses: ./.m1-ci/.github/actions/collect-scripts
        with:
          scripts-path: ${{ inputs.scripts-path }}
          changed-only: ${{ inputs.changed-files-only }}

      - name: Format check (m1-fmt --check)
        if: steps.collect.outputs.count != '0'
        run: xargs -0 -a "$RUNNER_TEMP/m1-scripts.nul" m1-fmt --check

  lint:
    name: Lint (m1-lint)
    if: inputs.run-lint
    runs-on: ubuntu-latest
    # security-events is only exercised when sarif-upload is enabled; the
    # effective token is the intersection with what the CALLER granted, so
    # callers that never enable SARIF are unaffected by requesting it here.
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Check out the project
        uses: actions/checkout@v6

      # See the fmt job: m1-ci's composite actions aren't in the caller's
      # checkout, so load them from m1-ci at the pinned ref.
      - name: Check out m1-ci (for composite actions)
        uses: actions/checkout@v6
        with:
          repository: ${{ inputs.m1-ci-repo }}
          ref: ${{ inputs.m1-ci-ref }}
          path: .m1-ci

      - name: Install m1-lint
        uses: ./.m1-ci/.github/actions/install-m1-tool
        with:
          tool: m1-lint
          version: ${{ inputs.lint-version }}
          tools-version: ${{ inputs.tools-version }}
          github-token: ${{ github.token }}

      - name: Register problem matchers
        run: |
          set -euo pipefail
          cat > "$RUNNER_TEMP/m1-matchers.json" <<'JSON'
          {
            "problemMatcher": [
              {
                "owner": "m1-diagnostic",
                "severity": "notice",
                "pattern": [
                  {
                    "regexp": "^(.+):(\\d+):(\\d+):\\s+(?:(error|warning)|(?:info|hint))\\[[^\\]]*\\]:\\s+(.+)$",
                    "file": 1,
                    "line": 2,
                    "column": 3,
                    "severity": 4,
                    "message": 5
                  }
                ]
              }
            ]
          }
          JSON
          echo "::add-matcher::$RUNNER_TEMP/m1-matchers.json"

      - name: Collect scripts
        id: collect
        uses: ./.m1-ci/.github/actions/collect-scripts
        with:
          scripts-path: ${{ inputs.scripts-path }}
          changed-only: ${{ inputs.changed-files-only }}

      - name: Lint (m1-lint)
        if: steps.collect.outputs.count != '0'
        env:
          FAIL_ON_WARNING: ${{ inputs.fail-on-warning }}
        run: |
          # Intentionally `set -uo pipefail` WITHOUT `-e`: m1-lint exits non-zero
          # on findings and that flows through the pipe; we read its status from
          # PIPESTATUS below and decide the outcome ourselves, so `-e` must not
          # abort the step before that logic runs.
          set -uo pipefail
          xargs -0 -a "$RUNNER_TEMP/m1-scripts.nul" m1-lint | tee "$RUNNER_TEMP/m1-lint.out"
          code=${PIPESTATUS[0]}
          if [ "$code" -ne 0 ]; then exit "$code"; fi
          if [ "$FAIL_ON_WARNING" = true ] && grep -q 'warning\[' "$RUNNER_TEMP/m1-lint.out"; then
            echo "::error::fail-on-warning: m1-lint reported warning-severity diagnostics"
            exit 1
          fi

      # Opt-in (#26): the same file set, re-rendered as SARIF 2.1.0 (m1-lint
      # --format sarif, C-Nucifora/m1-lint#109) and uploaded to GitHub code
      # scanning — Security-tab alerts, per-rule dismissal, new-alert diffing
      # on PRs. Runs even when the lint step above failed on findings (those
      # findings are exactly what should reach code scanning).
      - name: Render SARIF (m1-lint --format sarif)
        id: render-sarif-lint
        if: inputs.sarif-upload && steps.collect.outputs.count != '0' && !cancelled()
        run: |
          set -uo pipefail
          xargs -0 -a "$RUNNER_TEMP/m1-scripts.nul" m1-lint --format sarif \
            > "$RUNNER_TEMP/m1-lint.sarif"
          # m1-lint exits non-zero on findings; the SARIF document on stdout is
          # still complete. Only an empty document is a real failure.
          if ! [ -s "$RUNNER_TEMP/m1-lint.sarif" ]; then
            echo "::error::sarif-upload: m1-lint produced no SARIF output"
            exit 1
          fi

      # Upload only once Render produced a valid SARIF (#53): !cancelled() alone
      # is true on Render *failure* too, which would let upload-sarif emit a
      # second "SARIF file is empty" error masking the real one. Keep
      # !cancelled() so the step still runs after the lint step fails on findings
      # (an `if:` with no status function gets an implicit success(), which is
      # false then), and AND the render outcome gate on top.
      - name: Upload SARIF to code scanning
        if: inputs.sarif-upload && steps.collect.outputs.count != '0' && !cancelled() && steps.render-sarif-lint.outcome == 'success'
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: ${{ runner.temp }}/m1-lint.sarif
          category: m1-lint

  project-validate:
    name: Project validation (m1-project)
    if: inputs.run-project-validate
    runs-on: ubuntu-latest
    steps:
      - name: Check out the project
        uses: actions/checkout@v6

      # See the fmt job: m1-ci's composite actions aren't in the caller's
      # checkout, so load them from m1-ci at the pinned ref.
      - name: Check out m1-ci (for composite actions)
        uses: actions/checkout@v6
        with:
          repository: ${{ inputs.m1-ci-repo }}
          ref: ${{ inputs.m1-ci-ref }}
          path: .m1-ci

      # The project file: the explicit input, or the nearest Project.m1prj
      # found under/above scripts-path (the same project the typecheck step
      # would auto-discover). Empty = skip (script-only repo).
      - name: Locate Project.m1prj
        id: locate
        env:
          PROJECT_FILE: ${{ inputs.project-file }}
          SCRIPTS_PATH: ${{ inputs.scripts-path }}
        run: |
          set -euo pipefail
          file="$PROJECT_FILE"
          if [ -z "$file" ]; then
            file="$(find "$SCRIPTS_PATH/.." "$SCRIPTS_PATH" -maxdepth 3 -name 'Project.m1prj' -print -quit 2>/dev/null || true)"
          fi
          if [ -n "$file" ] && [ ! -f "$file" ]; then
            echo "::error::project-file '$file' does not exist"
            exit 1
          fi
          if [ -z "$file" ]; then
            echo "No Project.m1prj found — skipping project validation (script-only repo)."
          fi
          echo "file=$file" >> "$GITHUB_OUTPUT"

      - name: Install m1-project
        if: steps.locate.outputs.file != ''
        uses: ./.m1-ci/.github/actions/install-m1-tool
        with:
          tool: m1-project
          version: ${{ inputs.project-version }}
          tools-version: ${{ inputs.tools-version }}
          repo: nedlane/m1-project
          github-token: ${{ github.token }}

      - name: Validate (m1-project validate)
        if: steps.locate.outputs.file != ''
        env:
          PROJECT_FILE: ${{ steps.locate.outputs.file }}
          FAIL_ON_WARNING: ${{ inputs.fail-on-warning }}
        run: |
          # No `-e`: m1-project exits non-zero on error-level findings; we
          # surface every finding as an annotation first, then propagate.
          set -uo pipefail
          m1-project validate --project "$PROJECT_FILE" | tee "$RUNNER_TEMP/m1-project.out"
          code=${PIPESTATUS[0]}
          # Findings print as `ERROR <component>: <msg>` / `WARN <component>: <msg>`
          # — anchor each to the project file as an inline annotation.
          while IFS= read -r line; do
            case "$line" in
              ERROR\ *) echo "::error file=$PROJECT_FILE::${line#ERROR }" ;;
              WARN\ *) echo "::warning file=$PROJECT_FILE::${line#WARN }" ;;
            esac
          done < "$RUNNER_TEMP/m1-project.out"
          if [ "$code" -ne 0 ]; then exit "$code"; fi
          if [ "$FAIL_ON_WARNING" = true ] && grep -q '^WARN ' "$RUNNER_TEMP/m1-project.out"; then
            echo "::error::fail-on-warning: m1-project reported warning-level findings"
            exit 1
          fi

  typecheck:
    name: Type check (m1-typecheck)
    if: inputs.run-typecheck
    runs-on: ubuntu-latest
    # See the lint job: security-events is only exercised when sarif-upload
    # is enabled, and the effective token is the intersection with the
    # caller's grant. Without this the upload-sarif step fails with
    # "Resource not accessible by integration".
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Check out the project
        uses: actions/checkout@v6

      # See the fmt job: m1-ci's composite actions aren't in the caller's
      # checkout, so load them from m1-ci at the pinned ref.
      - name: Check out m1-ci (for composite actions)
        uses: actions/checkout@v6
        with:
          repository: ${{ inputs.m1-ci-repo }}
          ref: ${{ inputs.m1-ci-ref }}
          path: .m1-ci

      - name: Install m1-typecheck
        uses: ./.m1-ci/.github/actions/install-m1-tool
        with:
          tool: m1-typecheck
          version: ${{ inputs.typecheck-version }}
          tools-version: ${{ inputs.tools-version }}
          github-token: ${{ github.token }}

      - name: Register problem matchers
        run: |
          set -euo pipefail
          cat > "$RUNNER_TEMP/m1-matchers.json" <<'JSON'
          {
            "problemMatcher": [
              {
                "owner": "m1-diagnostic",
                "severity": "notice",
                "pattern": [
                  {
                    "regexp": "^(.+):(\\d+):(\\d+):\\s+(?:(error|warning)|(?:info|hint))\\[[^\\]]*\\]:\\s+(.+)$",
                    "file": 1,
                    "line": 2,
                    "column": 3,
                    "severity": 4,
                    "message": 5
                  }
                ]
              }
            ]
          }
          JSON
          echo "::add-matcher::$RUNNER_TEMP/m1-matchers.json"

      - name: Collect scripts
        id: collect
        uses: ./.m1-ci/.github/actions/collect-scripts
        with:
          scripts-path: ${{ inputs.scripts-path }}

      - name: Type check (m1-typecheck)
        if: steps.collect.outputs.count != '0'
        env:
          PROJECT_FILE: ${{ inputs.project-file }}
          FAIL_ON_WARNING: ${{ inputs.fail-on-warning }}
        run: |
          # Intentionally `set -uo pipefail` WITHOUT `-e`: m1-typecheck exits
          # non-zero on findings and that flows through the pipe; we read its
          # status from PIPESTATUS below and decide the outcome ourselves, so
          # `-e` must not abort the step before that logic runs.
          set -uo pipefail
          proj=()
          if [ -n "$PROJECT_FILE" ]; then
            proj=(--project "$PROJECT_FILE")
          fi
          xargs -0 -a "$RUNNER_TEMP/m1-scripts.nul" m1-typecheck "${proj[@]}" | tee "$RUNNER_TEMP/m1-typecheck.out"
          code=${PIPESTATUS[0]}
          if [ "$code" -ne 0 ]; then exit "$code"; fi
          if [ "$FAIL_ON_WARNING" = true ] && grep -q 'warning\[' "$RUNNER_TEMP/m1-typecheck.out"; then
            echo "::error::fail-on-warning: m1-typecheck reported warning-severity diagnostics"
            exit 1
          fi

      # See the lint job: the same file set re-rendered as SARIF 2.1.0
      # (m1-typecheck --format sarif, C-Nucifora/m1-typecheck#185) and uploaded
      # under its own category, so type findings — including the M1-Build-parity
      # errors — reach code scanning alongside the lint ones (#37). Runs even
      # when the check step above failed on findings.
      - name: Render SARIF (m1-typecheck --format sarif)
        id: render-sarif-typecheck
        if: inputs.sarif-upload && steps.collect.outputs.count != '0' && !cancelled()
        env:
          PROJECT_FILE: ${{ inputs.project-file }}
        run: |
          set -uo pipefail
          proj=()
          if [ -n "$PROJECT_FILE" ]; then
            proj=(--project "$PROJECT_FILE")
          fi
          xargs -0 -a "$RUNNER_TEMP/m1-scripts.nul" m1-typecheck "${proj[@]}" --format sarif \
            > "$RUNNER_TEMP/m1-typecheck.sarif"
          # m1-typecheck exits non-zero on findings; the SARIF document on
          # stdout is still complete. Only an empty document is a real failure.
          if ! [ -s "$RUNNER_TEMP/m1-typecheck.sarif" ]; then
            echo "::error::sarif-upload: m1-typecheck produced no SARIF output"
            exit 1
          fi

      # See the lint job (#53): keep !cancelled() so the step still runs after
      # the check step fails on findings, and AND a render-success gate on top
      # so a failed render doesn't trigger a masking upload-sarif error.
      - name: Upload SARIF to code scanning
        if: inputs.sarif-upload && steps.collect.outputs.count != '0' && !cancelled() && steps.render-sarif-typecheck.outcome == 'success'
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: ${{ runner.temp }}/m1-typecheck.sarif
          category: m1-typecheck
