name: M1 Check

# Reusable workflow: format-check, lint, and type-check the M1 scripts in the
# caller's repository with the C-Nucifora M1 toolchain. Diagnostics surface as
# inline annotations on the pull request.
#
# Each check runs as its OWN job (in parallel), so they are independent: a
# failing format check no longer skips the lint and type check — every check
# always runs and reports its own pass/fail as a separate status on the PR.
#
# Use it from an M1 project:
#
#   jobs:
#     check:
#       uses: C-Nucifora/m1-ci/.github/workflows/check.yml@main
#       with:
#         scripts-path: UQR-EV/01.00/Scripts
#         project-file: UQR-EV/01.00/Project.m1prj
#
# Tools are installed from the prebuilt release binaries published by each tool
# repo (m1-fmt / m1-lint / m1-typecheck); if a release is unavailable they are
# built from source as a fallback, so this works even before binaries exist.

on:
  workflow_call:
    inputs:
      scripts-path:
        description: "Directory searched recursively for .m1scr scripts."
        type: string
        default: "."
      project-file:
        description: "Path to Project.m1prj for symbol-aware type checking. Empty = auto-discover upward from each script."
        type: string
        default: ""
      # Per-tool version pins. These default to specific release tags so that a
      # given m1-ci tag installs a frozen, reproducible toolchain — pinning
      # `m1-ci@vX.Y.Z` means your CI keeps working even as the tools release new
      # (possibly stricter) versions. Each accepts a tag (e.g. "v0.4.1") or
      # "latest". When the tools release, bump these defaults and cut a new m1-ci
      # release; callers pinned to an older m1-ci tag are unaffected.
      #
      # These defaults MUST match tools.env — ci.yml's tools-pins job enforces it.
      fmt-version:
        description: "m1-fmt release to install: a tag like 'v0.5.1', or 'latest'."
        type: string
        default: "v0.5.1"
      lint-version:
        description: "m1-lint release to install: a tag like 'v0.9.0', or 'latest'."
        type: string
        default: "v0.9.0"
      typecheck-version:
        description: "m1-typecheck release to install: a tag like 'v0.20.1', or 'latest'."
        type: string
        default: "v0.20.1"
      tools-version:
        description: "Master override (advanced). Empty (default) uses the pinned per-tool versions above. Set to 'latest' to track the newest release of every tool; a single tag forces all three (the tools are independently versioned, so a shared tag may not exist for all)."
        type: string
        default: ""
      run-fmt:
        description: "Run m1-fmt --check."
        type: boolean
        default: true
      run-lint:
        description: "Run m1-lint."
        type: boolean
        default: true
      run-typecheck:
        description: "Run m1-typecheck."
        type: boolean
        default: true
      fail-on-warning:
        description: "Fail the build on warning-severity diagnostics, not just errors. m1-lint/m1-typecheck exit 0 on warnings by default."
        type: boolean
        default: false

env:
  CARGO_TERM_COLOR: always

# This reusable workflow only reads the caller's checkout and downloads public
# tool release binaries — no write scopes required.
permissions:
  contents: read

jobs:
  fmt:
    name: Format check (m1-fmt)
    # Skip the whole job (neutral, not failed) when the caller disables it.
    if: inputs.run-fmt
    runs-on: ubuntu-latest
    steps:
      - name: Check out the project
        uses: actions/checkout@v6

      - name: Install m1-fmt
        env:
          GH_TOKEN: ${{ github.token }}
          TOOL: m1-fmt
          VERSION: ${{ inputs.fmt-version }}
          TOOLS_VERSION: ${{ inputs.tools-version }}
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.local/bin"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          target=x86_64-unknown-linux-gnu
          tool="$TOOL"
          version="$VERSION"
          # Master override wins over the per-tool pin when set.
          [ -n "$TOOLS_VERSION" ] && version="$TOOLS_VERSION"
          repo="C-Nucifora/$tool"
          asset="$tool-$target"
          dest="$HOME/.local/bin/$tool"
          echo "::group::Install $tool ($version)"
          rm -f "$RUNNER_TEMP/$asset"
          if [ "$version" = latest ]; then
            gh release download --repo "$repo" --pattern "$asset" \
              --dir "$RUNNER_TEMP" --clobber 2>/dev/null || true
          else
            gh release download "$version" --repo "$repo" --pattern "$asset" \
              --dir "$RUNNER_TEMP" --clobber 2>/dev/null || true
          fi
          if [ -f "$RUNNER_TEMP/$asset" ]; then
            # Verify GitHub-native build provenance before trusting the binary
            # we are about to chmod +x and run on the caller's source (#7). A
            # release that predates attestation has none yet, so warn and proceed.
            if gh attestation verify "$RUNNER_TEMP/$asset" --repo "$repo" >/dev/null 2>&1; then
              echo "Verified build provenance for $tool $version."
            else
              echo "::warning::no verifiable build provenance for $tool $version (release predates attestation); proceeding."
            fi
            mv "$RUNNER_TEMP/$asset" "$dest"
            chmod +x "$dest"
            echo "Installed $tool $version from a release binary."
          else
            echo "No release asset for $tool ($version); building from source."
            if [ "$version" = latest ]; then
              cargo install --git "https://github.com/$repo.git" --root "$HOME/.local" "$tool"
            else
              cargo install --git "https://github.com/$repo.git" --tag "$version" --root "$HOME/.local" "$tool"
            fi
          fi
          "$dest" --help >/dev/null 2>&1 || true
          echo "::endgroup::"

      - name: Register problem matchers
        run: |
          set -euo pipefail
          # Inlined (not committed-and-referenced) because a reusable workflow runs
          # in the *caller's* checkout — m1-ci's own files are not present here.
          cat > "$RUNNER_TEMP/m1-matchers.json" <<'JSON'
          {
            "problemMatcher": [
              {
                "owner": "m1-fmt-check",
                "severity": "error",
                "pattern": [
                  {
                    "regexp": "^(.+):\\s+would reformat$",
                    "file": 1,
                    "message": 0
                  }
                ]
              }
            ]
          }
          JSON
          echo "::add-matcher::$RUNNER_TEMP/m1-matchers.json"

      - name: Collect scripts
        id: collect
        env:
          SCRIPTS_PATH: ${{ inputs.scripts-path }}
        run: |
          set -euo pipefail
          # NUL-delimited so script names containing spaces are handled safely.
          find "$SCRIPTS_PATH" -type f -name '*.m1scr' -print0 > "$RUNNER_TEMP/m1-scripts.nul"
          # Count -print0 records by their NUL terminators (robust for names with spaces/newlines).
          count=$(tr -dc '\0' < "$RUNNER_TEMP/m1-scripts.nul" | wc -c | tr -d ' ')
          echo "count=$count" >> "$GITHUB_OUTPUT"
          echo "Found $count .m1scr file(s) under '$SCRIPTS_PATH'."
          if [ "$count" -eq 0 ]; then
            echo "::warning::no .m1scr scripts found under '$SCRIPTS_PATH'"
          fi

      - name: Format check (m1-fmt --check)
        if: steps.collect.outputs.count != '0'
        run: xargs -0 -a "$RUNNER_TEMP/m1-scripts.nul" m1-fmt --check

  lint:
    name: Lint (m1-lint)
    if: inputs.run-lint
    runs-on: ubuntu-latest
    steps:
      - name: Check out the project
        uses: actions/checkout@v6

      - name: Install m1-lint
        env:
          GH_TOKEN: ${{ github.token }}
          TOOL: m1-lint
          VERSION: ${{ inputs.lint-version }}
          TOOLS_VERSION: ${{ inputs.tools-version }}
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.local/bin"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          target=x86_64-unknown-linux-gnu
          tool="$TOOL"
          version="$VERSION"
          [ -n "$TOOLS_VERSION" ] && version="$TOOLS_VERSION"
          repo="C-Nucifora/$tool"
          asset="$tool-$target"
          dest="$HOME/.local/bin/$tool"
          echo "::group::Install $tool ($version)"
          rm -f "$RUNNER_TEMP/$asset"
          if [ "$version" = latest ]; then
            gh release download --repo "$repo" --pattern "$asset" \
              --dir "$RUNNER_TEMP" --clobber 2>/dev/null || true
          else
            gh release download "$version" --repo "$repo" --pattern "$asset" \
              --dir "$RUNNER_TEMP" --clobber 2>/dev/null || true
          fi
          if [ -f "$RUNNER_TEMP/$asset" ]; then
            if gh attestation verify "$RUNNER_TEMP/$asset" --repo "$repo" >/dev/null 2>&1; then
              echo "Verified build provenance for $tool $version."
            else
              echo "::warning::no verifiable build provenance for $tool $version (release predates attestation); proceeding."
            fi
            mv "$RUNNER_TEMP/$asset" "$dest"
            chmod +x "$dest"
            echo "Installed $tool $version from a release binary."
          else
            echo "No release asset for $tool ($version); building from source."
            if [ "$version" = latest ]; then
              cargo install --git "https://github.com/$repo.git" --root "$HOME/.local" "$tool"
            else
              cargo install --git "https://github.com/$repo.git" --tag "$version" --root "$HOME/.local" "$tool"
            fi
          fi
          "$dest" --help >/dev/null 2>&1 || true
          echo "::endgroup::"

      - name: Register problem matchers
        run: |
          set -euo pipefail
          cat > "$RUNNER_TEMP/m1-matchers.json" <<'JSON'
          {
            "problemMatcher": [
              {
                "owner": "m1-diagnostic",
                "severity": "error",
                "pattern": [
                  {
                    "regexp": "^(.+):(\\d+):(\\d+):\\s+(error|warning|info|hint)\\[[^\\]]*\\]:\\s+(.+)$",
                    "file": 1,
                    "line": 2,
                    "column": 3,
                    "severity": 4,
                    "message": 5
                  }
                ]
              }
            ]
          }
          JSON
          echo "::add-matcher::$RUNNER_TEMP/m1-matchers.json"

      - name: Collect scripts
        id: collect
        env:
          SCRIPTS_PATH: ${{ inputs.scripts-path }}
        run: |
          set -euo pipefail
          find "$SCRIPTS_PATH" -type f -name '*.m1scr' -print0 > "$RUNNER_TEMP/m1-scripts.nul"
          count=$(tr -dc '\0' < "$RUNNER_TEMP/m1-scripts.nul" | wc -c | tr -d ' ')
          echo "count=$count" >> "$GITHUB_OUTPUT"
          echo "Found $count .m1scr file(s) under '$SCRIPTS_PATH'."
          if [ "$count" -eq 0 ]; then
            echo "::warning::no .m1scr scripts found under '$SCRIPTS_PATH'"
          fi

      - name: Lint (m1-lint)
        if: steps.collect.outputs.count != '0'
        env:
          FAIL_ON_WARNING: ${{ inputs.fail-on-warning }}
        run: |
          set -uo pipefail
          xargs -0 -a "$RUNNER_TEMP/m1-scripts.nul" m1-lint | tee "$RUNNER_TEMP/m1-lint.out"
          code=${PIPESTATUS[0]}
          if [ "$code" -ne 0 ]; then exit "$code"; fi
          if [ "$FAIL_ON_WARNING" = true ] && grep -q 'warning\[' "$RUNNER_TEMP/m1-lint.out"; then
            echo "::error::fail-on-warning: m1-lint reported warning-severity diagnostics"
            exit 1
          fi

  typecheck:
    name: Type check (m1-typecheck)
    if: inputs.run-typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Check out the project
        uses: actions/checkout@v6

      - name: Install m1-typecheck
        env:
          GH_TOKEN: ${{ github.token }}
          TOOL: m1-typecheck
          VERSION: ${{ inputs.typecheck-version }}
          TOOLS_VERSION: ${{ inputs.tools-version }}
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.local/bin"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          target=x86_64-unknown-linux-gnu
          tool="$TOOL"
          version="$VERSION"
          [ -n "$TOOLS_VERSION" ] && version="$TOOLS_VERSION"
          repo="C-Nucifora/$tool"
          asset="$tool-$target"
          dest="$HOME/.local/bin/$tool"
          echo "::group::Install $tool ($version)"
          rm -f "$RUNNER_TEMP/$asset"
          if [ "$version" = latest ]; then
            gh release download --repo "$repo" --pattern "$asset" \
              --dir "$RUNNER_TEMP" --clobber 2>/dev/null || true
          else
            gh release download "$version" --repo "$repo" --pattern "$asset" \
              --dir "$RUNNER_TEMP" --clobber 2>/dev/null || true
          fi
          if [ -f "$RUNNER_TEMP/$asset" ]; then
            if gh attestation verify "$RUNNER_TEMP/$asset" --repo "$repo" >/dev/null 2>&1; then
              echo "Verified build provenance for $tool $version."
            else
              echo "::warning::no verifiable build provenance for $tool $version (release predates attestation); proceeding."
            fi
            mv "$RUNNER_TEMP/$asset" "$dest"
            chmod +x "$dest"
            echo "Installed $tool $version from a release binary."
          else
            echo "No release asset for $tool ($version); building from source."
            if [ "$version" = latest ]; then
              cargo install --git "https://github.com/$repo.git" --root "$HOME/.local" "$tool"
            else
              cargo install --git "https://github.com/$repo.git" --tag "$version" --root "$HOME/.local" "$tool"
            fi
          fi
          "$dest" --help >/dev/null 2>&1 || true
          echo "::endgroup::"

      - name: Register problem matchers
        run: |
          set -euo pipefail
          cat > "$RUNNER_TEMP/m1-matchers.json" <<'JSON'
          {
            "problemMatcher": [
              {
                "owner": "m1-diagnostic",
                "severity": "error",
                "pattern": [
                  {
                    "regexp": "^(.+):(\\d+):(\\d+):\\s+(error|warning|info|hint)\\[[^\\]]*\\]:\\s+(.+)$",
                    "file": 1,
                    "line": 2,
                    "column": 3,
                    "severity": 4,
                    "message": 5
                  }
                ]
              }
            ]
          }
          JSON
          echo "::add-matcher::$RUNNER_TEMP/m1-matchers.json"

      - name: Collect scripts
        id: collect
        env:
          SCRIPTS_PATH: ${{ inputs.scripts-path }}
        run: |
          set -euo pipefail
          find "$SCRIPTS_PATH" -type f -name '*.m1scr' -print0 > "$RUNNER_TEMP/m1-scripts.nul"
          count=$(tr -dc '\0' < "$RUNNER_TEMP/m1-scripts.nul" | wc -c | tr -d ' ')
          echo "count=$count" >> "$GITHUB_OUTPUT"
          echo "Found $count .m1scr file(s) under '$SCRIPTS_PATH'."
          if [ "$count" -eq 0 ]; then
            echo "::warning::no .m1scr scripts found under '$SCRIPTS_PATH'"
          fi

      - name: Type check (m1-typecheck)
        if: steps.collect.outputs.count != '0'
        env:
          PROJECT_FILE: ${{ inputs.project-file }}
          FAIL_ON_WARNING: ${{ inputs.fail-on-warning }}
        run: |
          set -uo pipefail
          proj=()
          if [ -n "$PROJECT_FILE" ]; then
            proj=(--project "$PROJECT_FILE")
          fi
          xargs -0 -a "$RUNNER_TEMP/m1-scripts.nul" m1-typecheck "${proj[@]}" | tee "$RUNNER_TEMP/m1-typecheck.out"
          code=${PIPESTATUS[0]}
          if [ "$code" -ne 0 ]; then exit "$code"; fi
          if [ "$FAIL_ON_WARNING" = true ] && grep -q 'warning\[' "$RUNNER_TEMP/m1-typecheck.out"; then
            echo "::error::fail-on-warning: m1-typecheck reported warning-severity diagnostics"
            exit 1
          fi
