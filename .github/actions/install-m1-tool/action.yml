name: Install an M1 tool
description: >
  Install one C-Nucifora M1 tool (m1-fmt / m1-lint / m1-typecheck) from its
  prebuilt release binary, verifying GitHub-native build provenance before
  trusting it; falls back to building from source when no release asset exists.
  The installed binary is placed on PATH at $HOME/.local/bin.

# Shared by every install step in check.yml so the download + attestation +
# source-fallback logic lives in exactly one place. See check.yml for why the
# reusable workflow checks this repo out before `uses:`-ing this action.

inputs:
  tool:
    description: "Tool/crate name, e.g. m1-fmt, m1-lint, m1-typecheck."
    required: true
  version:
    description: "Release tag to install (e.g. 'v0.6.0'), or 'latest'."
    required: true
  tools-version:
    description: >
      Master override. Empty (default) uses `version`. When non-empty it wins
      over `version` for every tool — set to 'latest' or a single tag.
    required: false
    default: ""
  repo:
    description: "owner/name of the tool repo to download releases from."
    required: false
    default: ""
  github-token:
    description: "Token for `gh release download` / `gh attestation verify`."
    required: true

runs:
  using: composite
  steps:
    - name: Install ${{ inputs.tool }} (prebuilt)
      id: prebuilt
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        TOOL: ${{ inputs.tool }}
        TOOL_VERSION: ${{ inputs.version }}
        TOOLS_VERSION: ${{ inputs.tools-version }}
        TOOL_REPO: ${{ inputs.repo }}
      run: |
        set -euo pipefail
        mkdir -p "$HOME/.local/bin"
        echo "$HOME/.local/bin" >> "$GITHUB_PATH"
        target=x86_64-unknown-linux-gnu
        tool="$TOOL"
        version="$TOOL_VERSION"
        # Master override wins over the per-tool pin when set.
        [ -n "$TOOLS_VERSION" ] && version="$TOOLS_VERSION"
        repo="${TOOL_REPO:-C-Nucifora/$tool}"
        asset="$tool-$target"
        dest="$HOME/.local/bin/$tool"
        echo "::group::Install $tool ($version)"
        rm -f "$RUNNER_TEMP/$asset"
        if [ "$version" = latest ]; then
          gh release download --repo "$repo" --pattern "$asset" \
            --dir "$RUNNER_TEMP" --clobber 2>/dev/null || true
        else
          gh release download "$version" --repo "$repo" --pattern "$asset" \
            --dir "$RUNNER_TEMP" --clobber 2>/dev/null || true
        fi
        need_source=false
        if [ -f "$RUNNER_TEMP/$asset" ]; then
          # Verify GitHub-native build provenance before trusting the binary
          # we are about to chmod +x and run on the caller's source (#7). A
          # release that predates attestation has none yet, so warn and proceed.
          if gh attestation verify "$RUNNER_TEMP/$asset" --repo "$repo" >/dev/null 2>&1; then
            echo "Verified build provenance for $tool $version."
          else
            echo "::warning::no verifiable build provenance for $tool $version (release predates attestation); proceeding."
          fi
          mv "$RUNNER_TEMP/$asset" "$dest"
          chmod +x "$dest"
          echo "Installed $tool $version from a release binary."
        else
          echo "No release asset for $tool ($version); building from source."
          need_source=true
        fi
        echo "need-source=$need_source" >> "$GITHUB_OUTPUT"
        echo "version=$version" >> "$GITHUB_OUTPUT"
        echo "repo=$repo" >> "$GITHUB_OUTPUT"
        echo "::endgroup::"

    # Source-fallback path only (#24): cache the Cargo registry + git DBs so a
    # platform/tag with no prebuilt asset doesn't recompile the world each run.
    - name: Cache cargo (source fallback)
      if: steps.prebuilt.outputs.need-source == 'true'
      uses: Swatinem/rust-cache@v2
      with:
        shared-key: m1-ci-${{ inputs.tool }}-${{ steps.prebuilt.outputs.version }}
        cache-targets: false

    - name: Build ${{ inputs.tool }} from source
      if: steps.prebuilt.outputs.need-source == 'true'
      shell: bash
      env:
        TOOL: ${{ inputs.tool }}
        BUILD_VERSION: ${{ steps.prebuilt.outputs.version }}
        BUILD_REPO: ${{ steps.prebuilt.outputs.repo }}
      run: |
        set -euo pipefail
        # --locked (#23): build exactly the dependency set the tag's Cargo.lock
        # pins, instead of whatever resolves freshest at run time.
        if [ "$BUILD_VERSION" = latest ]; then
          cargo install --locked --git "https://github.com/$BUILD_REPO.git" --root "$HOME/.local" "$TOOL"
        else
          cargo install --locked --git "https://github.com/$BUILD_REPO.git" --tag "$BUILD_VERSION" --root "$HOME/.local" "$TOOL"
        fi
        "$HOME/.local/bin/$TOOL" --help >/dev/null 2>&1 || true
