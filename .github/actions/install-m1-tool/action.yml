name: Install an M1 tool
description: >
  Install one C-Nucifora M1 tool (m1-fmt / m1-lint / m1-typecheck) from its
  prebuilt release binary, verifying GitHub-native build provenance before
  trusting it; falls back to building from source when no release asset exists.
  The installed binary is placed on PATH at $HOME/.local/bin.

# Shared by every install step in check.yml so the download + attestation +
# source-fallback logic lives in exactly one place. See check.yml for why the
# reusable workflow checks this repo out before `uses:`-ing this action.

inputs:
  tool:
    description: "Tool/crate name, e.g. m1-fmt, m1-lint, m1-typecheck."
    required: true
  version:
    description: "Release tag to install (e.g. 'v0.6.0'), or 'latest'."
    required: true
  tools-version:
    description: >
      Master override. Empty (default) uses `version`. When non-empty it wins
      over `version` for every tool — set to 'latest' or a single tag.
    required: false
    default: ""
  repo:
    description: "owner/name of the tool repo to download releases from."
    required: false
    default: ""
  github-token:
    description: "Token for `gh release download` / `gh attestation verify`."
    required: true

runs:
  using: composite
  steps:
    # Resolve the effective version up front so `latest` becomes a concrete,
    # immutable tag — which makes the binary cacheable (#43) and the install
    # reproducible within a run.
    - name: Resolve ${{ inputs.tool }} version
      id: resolve
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        TOOL: ${{ inputs.tool }}
        TOOL_VERSION: ${{ inputs.version }}
        TOOLS_VERSION: ${{ inputs.tools-version }}
        TOOL_REPO: ${{ inputs.repo }}
      run: |
        set -euo pipefail
        version="$TOOL_VERSION"
        # Master override wins over the per-tool pin when set.
        [ -n "$TOOLS_VERSION" ] && version="$TOOLS_VERSION"
        repo="${TOOL_REPO:-C-Nucifora/$TOOL}"
        if [ "$version" = latest ]; then
          # Resolve to the concrete tag; if the API call fails, fall back to
          # the mutable 'latest' (which then bypasses the cache).
          version=$(gh api "repos/$repo/releases/latest" --jq .tag_name 2>/dev/null || echo latest)
        fi
        echo "version=$version" >> "$GITHUB_OUTPUT"
        echo "repo=$repo" >> "$GITHUB_OUTPUT"
        echo "cacheable=$([ "$version" = latest ] && echo false || echo true)" >> "$GITHUB_OUTPUT"

    # A pinned release asset is immutable: cache the (already verified) binary
    # by tool+version+target so the common path skips the download AND the
    # attestation round-trip, and survives transient release-asset 5xx (#43).
    - name: Cache ${{ inputs.tool }} binary
      id: bincache
      if: steps.resolve.outputs.cacheable == 'true'
      uses: actions/cache@v4
      with:
        path: ~/.m1-tool-cache/${{ inputs.tool }}
        key: m1-tool-${{ inputs.tool }}-${{ steps.resolve.outputs.version }}-x86_64-unknown-linux-gnu

    - name: Install ${{ inputs.tool }} (prebuilt)
      id: prebuilt
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        TOOL: ${{ inputs.tool }}
        VERSION: ${{ steps.resolve.outputs.version }}
        REPO: ${{ steps.resolve.outputs.repo }}
        CACHE_HIT: ${{ steps.bincache.outputs.cache-hit }}
      run: |
        set -euo pipefail
        mkdir -p "$HOME/.local/bin"
        echo "$HOME/.local/bin" >> "$GITHUB_PATH"
        target=x86_64-unknown-linux-gnu
        tool="$TOOL"
        version="$VERSION"
        repo="$REPO"
        asset="$tool-$target"
        dest="$HOME/.local/bin/$tool"
        cached="$HOME/.m1-tool-cache/$tool/$tool"
        echo "::group::Install $tool ($version)"
        if [ "$CACHE_HIT" = "true" ] && [ -f "$cached" ]; then
          # The cached binary was attestation-verified before being stored,
          # and the key pins the exact version — nothing to re-check.
          install -m 0755 "$cached" "$dest"
          echo "Installed $tool $version from the binary cache."
          echo "need-source=false" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "repo=$repo" >> "$GITHUB_OUTPUT"
          echo "::endgroup::"
          exit 0
        fi
        rm -f "$RUNNER_TEMP/$asset"
        if [ "$version" = latest ]; then
          gh release download --repo "$repo" --pattern "$asset" \
            --dir "$RUNNER_TEMP" --clobber 2>/dev/null || true
        else
          gh release download "$version" --repo "$repo" --pattern "$asset" \
            --dir "$RUNNER_TEMP" --clobber 2>/dev/null || true
        fi
        need_source=false
        if [ -f "$RUNNER_TEMP/$asset" ]; then
          # Verify GitHub-native build provenance before trusting the binary
          # we are about to chmod +x and run on the caller's source (#7).
          # Classify the failure (#48): a release that predates attestation
          # has none ("no attestations found") — warn and proceed. Anything
          # else from an authenticated gh (tampered asset, wrong repo, bad
          # predicate) FAILS CLOSED instead of running the binary anyway.
          if out=$(gh attestation verify "$RUNNER_TEMP/$asset" --repo "$repo" 2>&1); then
            echo "Verified build provenance for $tool $version."
          elif printf '%s' "$out" | grep -qiE 'no attestations found|HTTP 404|Not Found'; then
            echo "::warning::no build provenance for $tool $version (release predates attestation); proceeding."
          else
            echo "::error::build-provenance verification FAILED for $tool $version — refusing to run the binary."
            printf '%s\n' "$out"
            exit 1
          fi
          mkdir -p "$HOME/.m1-tool-cache/$tool"
          install -m 0755 "$RUNNER_TEMP/$asset" "$cached"
          install -m 0755 "$RUNNER_TEMP/$asset" "$dest"
          echo "Installed $tool $version from a release binary."
        else
          echo "No release asset for $tool ($version); building from source."
          need_source=true
        fi
        echo "need-source=$need_source" >> "$GITHUB_OUTPUT"
        echo "version=$version" >> "$GITHUB_OUTPUT"
        echo "repo=$repo" >> "$GITHUB_OUTPUT"
        echo "::endgroup::"

    # Source-fallback path only (#24): cache the Cargo registry + git DBs so a
    # platform/tag with no prebuilt asset doesn't recompile the world each run.
    - name: Cache cargo (source fallback)
      if: steps.prebuilt.outputs.need-source == 'true'
      uses: Swatinem/rust-cache@v2
      with:
        shared-key: m1-ci-${{ inputs.tool }}-${{ steps.prebuilt.outputs.version }}
        cache-targets: false

    - name: Build ${{ inputs.tool }} from source
      if: steps.prebuilt.outputs.need-source == 'true'
      shell: bash
      env:
        TOOL: ${{ inputs.tool }}
        BUILD_VERSION: ${{ steps.prebuilt.outputs.version }}
        BUILD_REPO: ${{ steps.prebuilt.outputs.repo }}
      run: |
        set -euo pipefail
        # --locked (#23): build exactly the dependency set the tag's Cargo.lock
        # pins, instead of whatever resolves freshest at run time.
        if [ "$BUILD_VERSION" = latest ]; then
          cargo install --locked --git "https://github.com/$BUILD_REPO.git" --root "$HOME/.local" "$TOOL"
        else
          cargo install --locked --git "https://github.com/$BUILD_REPO.git" --tag "$BUILD_VERSION" --root "$HOME/.local" "$TOOL"
        fi
        "$HOME/.local/bin/$TOOL" --help >/dev/null 2>&1 || true
